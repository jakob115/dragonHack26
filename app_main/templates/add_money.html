{% extends 'base.html' %}

{% block title %}Ledger | Add Money{% endblock %}
{% block page_title %}Add Money{% endblock %}

{% block content %}

<div class="stack">
    <div class="panel">
        <div class="panel-head">
            <div class="panel-title">Add new money</div>
        </div>
        <div class="panel-body">
            <form method="post" action="{% url 'submit_money' %}">
                {% csrf_token %}

                <div class="qa-fields">
                        <div class="qa-field">
                            <div class="qa-label">Account</div>
                            <select class="qa-input qa-select" name="account">
                                <option value="">No account selected</option>
                                {% for account in accounts %}
                                    <option value="{{ account.id }}">{{ account.title }}</option>
                                {% endfor %}
                            </select>
                        </div>
                </div>

                <div class="qa-fields">
                        <div class="qa-field">
                            <div class="qa-label">Amount</div>
                            <input class="qa-input" type="text" name="amount" placeholder="€ 100.0">
                        </div>
                        <div class="qa-field">
                            <div class="qa-label">Type</div>
                            <input class="qa-input" type="text" name="type" placeholder="e.g. Cash, handout, ...">
                        </div>
                </div>

                <div id="expense-items">
                    <div class="qa-fields">
                        <div class="qa-field qa-field-wide">
                            <div class="qa-label">Description (optional)</div>
                            <textarea class="qa-input modal-textarea" id="money-description" name="description" placeholder="e.g. For my birthday!"></textarea>
                        </div>
                    </div>
                </div>

                <div class="section-spacer"></div>

                <div class="qa-btns">
                    <button class="btn btn-gold btn-flex" type="submit">Submit Money</button>
                </div>
            </form>
        </div>
    </div>
</div>

{% endblock %}

{% block extrascripts %}
<script>
(() => {
    const description = document.getElementById("money-description");
    if (!description) return;

    const resize = () => {
        description.style.height = "auto";
        description.style.height = `${description.scrollHeight}px`;
    };

    resize();
    description.addEventListener("input", resize);
})();
</script>
{% endblock %}
